services:
  neo4j:
    image: neo4j:5-community
    container_name: drone-graph-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/drone-graph-dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./var/neo4j/data:/data
      - ./var/neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
